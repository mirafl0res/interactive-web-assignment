<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Vibrations</title>
    <link rel="stylesheet" href="style.css" />
    <script src="config.js"></script>
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <div class="header-left">
        <h1 id="site-logo">🎵 Good Vibrations</h1>
      </div>
      
      <div class="header-center">
        <!-- SEARCH FIELD ALWAYS VISIBLE -->
        <div class="global-search">
          <label for="search-input" class="sr-only">Search</label>
          <input type="text" id="search-input" placeholder="Search artists, albums, or tracks..." />
          <select id="search-type">
            <option value="artist">Artist</option>
            <option value="album">Album</option>
            <option value="track">Song</option>
          </select>
          <button id="search-btn">Search</button>
          <div role="listbox" id="results-container"></div>
        </div>
      </div>

      <div class="header-right">
        <nav>
          <button data-view="home">Home</button>
        </nav>
      </div>
    </header>

    <!-- HOME PAGE -->
    <section tabindex="-1" id="home-section" class="hidden">
      <h2>Top Charts</h2>  

      <div id="home-chart-container">
        <!-- dynamically inserted list will go here -->
      </div>
    </section>

    <!-- ARTIST PAGE -->
    <section tabindex="-1" id="artist-section" class="hidden"></section>

    <!-- ALBUM PAGE -->
    <section tabindex="-1" id="album-section" class="hidden"></section>

    <!-- TRACK PAGE -->
    <section tabindex="-1" id="track-section" class="hidden"></section>

    <!-- TAG PAGE -->
    <section tabindex="-1" id="tag-section" class="hidden"></section>


    
  </body>
</html>
